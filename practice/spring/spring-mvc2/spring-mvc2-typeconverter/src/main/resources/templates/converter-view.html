<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<ul>
  <li>${number}: <span th:text="${number}"></span></li>
  <li>${{number}}: <span th:text="${{number}}"></span></li>
  <li>${ipPort}: <span th:text="${ipPort}"></span></li>
  <li>${{ipPort}}: <span th:text="${{ipPort}}"></span></li> <!--${{...}}을 사용하면 자동으로 컨버전 서비스를 사용해서 변환된 결과를 출력-->
</ul>
</body>
</html>
